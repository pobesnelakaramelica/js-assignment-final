<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KP Studios - Login</title>
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg custom-header py-3">
    <div class="container-fluid px-lg-5">
        
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-3">
                <li class="nav-item"><a class="nav-link nav-item-text" href="proizvodi.html" title="Nazad na početnu">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-item-text" href="about.html" title="Informacije o studiju">About</a></li>
                <li class="nav-item"><a class="nav-link nav-item-text active" href="login.html" title="Trenutna stranica: Login">Login</a></li>
            </ul>

            <div class="mx-auto d-none d-lg-block">
                <div class="search-container d-flex align-items-center">
                    <input type="text" class="search-input" placeholder="Look for...">
                    <img src="slike/src.svg" alt="Search" class="search-icon">
                </div>
            </div>

            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="logo-text fw-bold">KP studios</span>
                <img src="slike/avatar.svg" alt="Profile" class="avatar-img">
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="product-card p-4 p-md-5 text-center shadow">
                    <h1 class="content mb-4 text-center">Prijavi se</h1>
                    <p class="mb-4">Dobrodošli nazad u KP Studios!</p>

                    <form id="login-form">
                        <div class="text-start mb-3">
                            <label class="form-label fw-bold">Korisničko ime / Email</label>
                            <input type="text" id="user-email" class="form-control" placeholder="Unesite korisničko ime" required>
                        </div>

                        <div class="text-start mb-4">
                            <label class="form-label fw-bold">Lozinka</label>
                            <input type="password" id="user-pass" class="form-control" placeholder="Unesite lozinku" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Uloguj se</button>
                    </form>

                    <a href="#" class="mt-3 d-inline-block text-decoration-none forgot-password-link" title="Započnite proces oporavka lozinke">Zaboravili ste lozinku?</a>
                </div>

            </div>
        </div>
    </div>
</main>

<footer class="custom-footer py-4 mt-auto">
    <div class="container-fluid px-lg-5">
        <div class="d-flex justify-content-between align-items-center">
            <p class="footer-text mb-0">© 2025 KP Studios | Ksenija Pavlović</p>
             <!--tema-->
                         <div class="heart-container mt-5">
                    <button id="theme-button" class="heart-btn" title="Promeni temu sajta">
                        ❤
                    </button>
                    <p class="mt-2 text-muted small-text">Klikni srce za magiju!</p>
                </div>
                 <!--tema-->
            <div class="social-icons d-flex gap-3">
                <a href="#" title="Pratite KP Studios na Pinterestu"><img src="slike/pinterest.svg" alt="Pinterest" class="social-img"></a>
                <a href="#" title="Gledajte KP Studios tutorijale"><img src="slike/yt.svg" alt="YouTube" class="social-img"></a>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
